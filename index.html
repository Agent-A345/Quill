<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quill — Markdown Editor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Documents</span>
      <button class="icon-btn" id="newDocBtn" title="New Document" aria-label="New document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <ul class="doc-list" id="docList" role="listbox" aria-label="Document list"></ul>
  </aside>

  <!-- MAIN LAYOUT -->
  <div class="app-shell" id="appShell">

    <!-- TOP BAR -->
    <header class="topbar" role="banner">
      <div class="topbar-left">
        <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="brand">
          <span class="brand-name">Quill</span>
          <span class="doc-title-display" id="docTitleDisplay">Untitled</span>
        </div>
      </div>

      <div class="toolbar" role="toolbar" aria-label="Formatting tools">
        <div class="toolbar-group">
          <button class="tool-btn" data-action="h1" title="Heading 1" aria-label="Heading 1"><span>H1</span></button>
          <button class="tool-btn" data-action="h2" title="Heading 2" aria-label="Heading 2"><span>H2</span></button>
          <button class="tool-btn" data-action="h3" title="Heading 3" aria-label="Heading 3"><span>H3</span></button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tool-btn" data-action="bold" title="Bold (Ctrl+B)" aria-label="Bold">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
          </button>
          <button class="tool-btn" data-action="italic" title="Italic (Ctrl+I)" aria-label="Italic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
          </button>
          <button class="tool-btn" data-action="strikethrough" title="Strikethrough" aria-label="Strikethrough">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><path d="M16 6C16 6 14.5 4 12 4C9 4 7 6 7 8C7 10 9 11 12 11"/><path d="M8 18C8 18 9.5 20 12 20C15 20 17 18 17 16C17 14 15 13 12 13"/></svg>
          </button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tool-btn" data-action="ul" title="Unordered List" aria-label="Bullet list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
          </button>
          <button class="tool-btn" data-action="ol" title="Ordered List" aria-label="Numbered list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none">1.</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none">2.</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none">3.</text></svg>
          </button>
          <button class="tool-btn" data-action="task" title="Task List" aria-label="Task list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="4" height="4" rx="0.5"/><line x1="10" y1="7" x2="21" y2="7"/><rect x="3" y="11" width="4" height="4" rx="0.5"/><polyline points="4,13 5,14.5 7,12"/><line x1="10" y1="13" x2="21" y2="13"/><rect x="3" y="17" width="4" height="4" rx="0.5"/><line x1="10" y1="19" x2="21" y2="19"/></svg>
          </button>
          <button class="tool-btn" data-action="blockquote" title="Blockquote" aria-label="Blockquote">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
          </button>
          <button class="tool-btn" data-action="hr" title="Horizontal Rule" aria-label="Horizontal rule">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/></svg>
          </button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tool-btn" data-action="link" title="Insert Link (Ctrl+K)" aria-label="Insert link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="tool-btn" data-action="image" title="Insert Image" aria-label="Insert image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <button class="tool-btn" data-action="code" title="Inline Code" aria-label="Inline code">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </button>
          <button class="tool-btn" data-action="codeblock" title="Code Block" aria-label="Code block">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button class="tool-btn" data-action="table" title="Insert Table" aria-label="Insert table">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
          </button>
        </div>
        <div class="toolbar-sep"></div>
        <button class="tool-btn danger" data-action="clear" title="Clear Document" aria-label="Clear document">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>

      <div class="topbar-right">
        <button class="action-btn" id="copyHtmlBtn" title="Copy HTML" aria-label="Copy HTML">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>HTML</span>
        </button>
        <div class="export-menu-wrap">
          <button class="action-btn" id="exportBtn" aria-label="Export options">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Export</span>
          </button>
          <div class="export-menu" id="exportMenu" role="menu">
            <button class="export-item" data-export="md" role="menuitem">Download .md</button>
            <button class="export-item" data-export="html" role="menuitem">Download .html</button>
            <button class="export-item" data-export="pdf" role="menuitem">Print / PDF</button>
          </div>
        </div>
        <button class="icon-btn" id="themeToggle" title="Toggle Theme" aria-label="Toggle dark/light mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="fullscreenBtn" title="Fullscreen (F11)" aria-label="Toggle fullscreen">
          <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          <svg class="compress-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
        </button>
      </div>
    </header>

    <!-- EDITOR / PREVIEW PANE -->
    <main class="workspace" id="workspace" role="main">
      <section class="pane editor-pane" aria-label="Markdown editor">
        <div class="pane-label">MARKDOWN</div>
        <div class="editor-wrap">
          <div class="line-numbers" id="lineNumbers" aria-hidden="true"></div>
          <textarea
            id="editor"
            class="editor-textarea"
            spellcheck="true"
            autocapitalize="off"
            autocorrect="off"
            placeholder="Start writing Markdown…&#10;&#10;# Hello, Quill&#10;&#10;**Bold**, *italic*, `code`&#10;&#10;- Item 1&#10;- [ ] Task&#10;&#10;| Col A | Col B |&#10;|-------|-------|&#10;| data  | data  |"
            aria-label="Markdown input"
          ></textarea>
        </div>
      </section>

      <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="Resize panels" tabindex="0"></div>

      <section class="pane preview-pane" aria-label="Preview">
        <div class="pane-label">PREVIEW</div>
        <div class="preview-scroll" id="previewScroll">
          <div class="preview-content" id="preview" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <!-- STATUSBAR -->
    <footer class="statusbar" role="contentinfo">
      <div class="status-left">
        <span class="status-chip" id="savedStatus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Saved
        </span>
        <span class="status-sep">|</span>
        <span id="statusWords">0 words</span>
        <span class="status-sep">|</span>
        <span id="statusChars">0 chars</span>
        <span class="status-sep">|</span>
        <span id="statusLines">0 lines</span>
      </div>
      <div class="status-right">
        <span id="statusReadTime">0 min read</span>
        <span class="status-sep">|</span>
        <span id="statusCursor">Ln 1, Col 1</span>
      </div>
    </footer>

  </div><!-- end app-shell -->

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- RENAME MODAL -->
  <div class="modal-overlay" id="renameModal" role="dialog" aria-modal="true" aria-labelledby="renameModalTitle">
    <div class="modal">
      <div class="modal-title" id="renameModalTitle">Rename Document</div>
      <input type="text" class="modal-input" id="renameInput" aria-label="Document name" />
      <div class="modal-actions">
        <button class="modal-btn cancel" id="renameCancelBtn">Cancel</button>
        <button class="modal-btn confirm" id="renameConfirmBtn">Rename</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
